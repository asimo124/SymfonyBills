
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symfony_api_app
    env_file:
      - .env
      - path: .env.local
        required: false
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  # Same env files as app: ${VAR} in compose only reads project .env, NOT .env.local — without this,
  # db could get empty/wrong MARIADB_* while app used DATABASE_URL from .env.local → 1045.
  db:
    image: mariadb:10.11.14
    container_name: symfony_api_db
    restart: unless-stopped
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      MARIADB_USER: app
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mariadb_data:
