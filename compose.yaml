
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symfony_api_app
    env_file:
      - .env
      - .env.local
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  # DB app user is fixed to "app" so MARIADB_USER=root in .env cannot break MariaDB init.
  # Superuser password: MARIADB_ROOT_PASSWORD. Symfony DATABASE_URL must use app + MARIADB_PASSWORD.
  db:
    image: mariadb:10.11.14
    container_name: symfony_api_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: app
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mariadb_data:
